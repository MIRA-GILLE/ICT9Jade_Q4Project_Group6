<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marshal Academy | Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background: #101828;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .login-box {
        background: white;
        width: 350px;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        border-top: 5px solid #D4AF37;
    }

    .school-logo {
        width: 100px;
        height: 100px;
        border-radius: 100px;
        border: 2px solid #D4AF37;
        margin-bottom: 15px;
    }

    h2 {
        color: #101828;
        font-weight: bold;
        font-size: 22px;
        margin: 5px 0;
    }

    label {
        display: block;
        text-align: left;
        font-weight: bold;
        font-size: 13px;
        color: #101828;
        margin-top: 15px;
    }

    .btn-login {
        background-color: #101828;
        color: white;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        margin-top: 20px;
        font-weight: bold;
    }

    #message {
        font-size: 12px;
        color: red;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="login-box">
    <img src="https://www.image2url.com/r2/default/images/1777270232853-7c3e97ca-e8a1-4a12-ac48-a8891111d17a.png" class="school-logo">
    
    <p style="color: #D4AF37; font-size: 12px; margin: 0; font-weight: bold;">DEAR MARSHAL,</p>
    <h2>Student Login</h2>
    <p style="color: #666; font-size: 10px; margin-bottom: 20px;">FORGING FUTURE LEADERS OF SOCIETY</p>

    <form>
        <label>Student Email:</label>
        <input type="email" id="email" class="form-control">

        <label>Student Password:</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password">

        <div id="message"></div>

        <button type="button" class="btn-login" onclick="checkLogin()">Enter Portal</button>
    </form>
</div>

<script>
    var attempts = 0;

    function checkLogin() {
        var userEmail = document.getElementById("email").value;
        var userPass = document.getElementById("password").value;
        var errorMsg = document.getElementById("message");

        if (userEmail == "cruz.vjd@gmail.com" && userPass == "0192837465") {
            alert("Welcome home, Marshal.");
            window.location.href = "virtualntbks.html";
        } else {
            attempts = attempts + 1;
            errorMsg.innerHTML = "Invalid login. Attempt " + attempts + " of 3";
            
            if (attempts >= 3) {
                alert("Terminal locked. Contact the Head Marshal.");
            }
        }
    }
</script>

</body>
</html>
