<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marshal Academy | Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background: #101828;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .login-box {
        background: white;
        width: 350px;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        border-top: 5px solid #D4AF37;
    }

    .school-logo {
    width: 130px;
    height: 130px;   
    border-radius: 50%;
    border: 2px solid #D4AF37;
    background: white;
    display: block;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 20px;
    padding: 8px;
    object-fit: contain;
    box-sizing: border-box; 
}

    

    h2 {
        color: #101828;
        font-weight: bold;
        font-size: 22px;
        margin: 5px 0;
    }

    label {
        display: block;
        text-align: left;
        font-weight: bold;
        font-size: 13px;
        color: #101828;
        margin-top: 15px;
    }

    .btn-login {
        background-color: #101828;
        color: white;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        margin-top: 20px;
        font-weight: bold;
        transition: background-color 0.3s ease;
    }

    .btn-login:hover {
        background-color: #2d3e50;
    }

    input:focus {
        outline: none;
        border: 2px solid #D4AF37 !important;
        box-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
    }

    #message {
        font-size: 12px;
        color: red;
        margin-top: 10px;
    }

    .btn-clear {
        background-color: #666;
        margin-top: 10px;
        width: 80px;
        padding: 6px;
        font-size: 12px;
        transition: background-color 0.3s ease;
    }

    .btn-clear:hover {
        background-color: #d32f2f;
    }
</style>
</head>
<body>

<div class="login-box">
  <img src="https://www.image2url.com/r2/default/images/1777505685251-2386c32c-b62e-4d42-a175-4880b1642722.png" alt="image" class="school-logo">
    
    <p style="color: #D4AF37; font-size: 12px; margin: 0; font-weight: bold;">DEAR MARSHAL,</p>
    <h2>Student Login</h2>
    <p style="color: #666; font-size: 10px; margin-bottom: 20px;">FORGING FUTURE LEADERS OF SOCIETY</p>

    <form>
        <label>Student Email:</label>
        <input type="email" id="email" class="form-control"  placeholder="Enter your Student Email">


        <label>Student ID:</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your Student ID...">

        <div style="display: flex; align-items: center; margin-top: 15px;">
            <input type="checkbox" id="rememberMe" style="margin-right: 10px; cursor: pointer; width: 18px; height: 18px;">
            <label style="margin: 0; margin-top: 0; font-size: 16px; font-weight: 500;" for="rememberMe">Remember Me</label>
        </div>

        <div id="message"></div>

        <button type="button" class="btn-login" onclick="checkLogin()">Enter Portal</button>
        <button type="button" class="btn-login btn-clear" onclick="clearAll()">Clear All</button>
    </form>
</div>

<script>
    var attempts = 0;

    function checkLogin() {
        var userEmail = document.getElementById("email").value;
        var userPass = document.getElementById("password").value;
        var rememberMe = document.getElementById("rememberMe").checked;
        var errorMsg = document.getElementById("message");

        if (userEmail == "cruz.vjd@gmail.com" && userPass == "0192837465") {
            if (rememberMe) {
                alert("Login successful! Your credentials will be remembered.");
            } else {
                alert("Welcome home, Marshal.");
            }
            window.location.href = "";
        } else {
            attempts = attempts + 1;
            errorMsg.innerHTML = "Invalid login. Attempt " + attempts + " of 3";
            
            if (attempts >= 3) {
                alert("Too many failed attempts. Please contact the Head Marshal or try again later.");
            }
        }
    }

    function clearAll() {
        if (confirm("Are you sure you want to clear all fields?")) {
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";
            document.getElementById("rememberMe").checked = false;
            document.getElementById("message").innerHTML = "";
            alert("Success! All fields have been cleared.");
        }
    }

    document.getElementById("rememberMe").addEventListener("change", function() {
        if (this.checked) {
            alert("Your login credentials will be remembered for next time.");
        }
    });
</script>

</body>
</html>
